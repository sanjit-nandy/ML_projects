  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    .banner {
  display: flex;
  gap: 20px;
}

@media screen and (max-width: 768px) {

  .banner {
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 90%;
    max-width: 400px;
  }

    .card {
      width: 400px;
      height: 220px;
      perspective: 1000px;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .card:hover .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-weight: bold;
      border-radius: 8px;
    }

    .card-front {
      background: #ff4081; /* pink */
    }
    .card-back {
      background: #87b3df;
      transform: rotateY(180deg);
    }
    .card-back-green {
      background: #6dcd77;
      transform: rotateY(180deg);
    }

    /* Different colors for each card */
    .card:nth-child(2) .card-front { background: none; padding:0; } /* image card */
    .card:nth-child(3) .card-front { background: #2196f3; } /* blue */
    .card:nth-child(4) .card-front { background: #ffeb3b; color:#000; } /* yellow */

    /* Navigation Bar */

    .navbar {
      background: #333;
      overflow: hidden;
    }

    .navbar a,
.dropdown .dropbtn {

  float: left;
  font-size: 16px;
  color: white;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  border: 1px solid #b0b0b0;
  outline: none;
  background: black;
  cursor: pointer;
}

    .navbar a:hover,
    .dropdown:hover .dropbtn {
      background: #111;
    }

    .dropdown {
      float: left;
      overflow: hidden;
    }

    .dropdown-content {

      display: none;
      position: absolute;
      background: #f9f9f9;
      min-width: 200px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1;
    }

    .dropdown-content a {

      float: none;
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      text-align: left;
    }

    .dropdown-content a:hover {
      background-color: #ddd;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    }

    select {

      display: block;
      padding: 8px;
      font-size: 14px;
    }

    /* Table */

    table {

      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
      background: white;
    }

    table, th, td {
      border: 1px solid #333;
    }

    th, td {

      padding: 12px;
      text-align: left;
    }

    th {
      background: #333;
      color: white;
    }

    /* Contact Box */

    .contact-box {

      background: white;
      width: 90%;
      max-width: 700px;
      margin: 10px auto;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
      line-height: 1.2;
      font-size: 14px;
      box-sizing: border-box;
      overflow-wrap: break-word;
    }

    .contact-box a {
      color: blue;
      text-decoration: underline;
    }

    /* Marquee */

    .marquee-container {

      width: 85%;
      margin: 10px auto;
      overflow: hidden;
      background: #ffecec;
      border: 2px solid red;
      border-radius: 10px;
      padding: 10px 0;
      position: relative;
    }

    .marquee-text {

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      white-space: normal;
      font-size: 14px;
      font-weight: bold;
      color: #b30000;
      padding: 5px 10px;
      line-height: 1.4;
    }

    .highlight-text {

      font-size: 18px;
      color: blue;
      font-weight: bold;
      padding: 0 5px;
      animation: blinkText 1s infinite;
    }

    @keyframes blinkText {

      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }

      100% {
        opacity: 1;
      }
    }

    /* Gallery */

    .gallery-container {

      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      padding: 10px;

      .contact-box {

        padding: 15px;

      iframe {

        height: 160px !important;

      .gallery-container img {

    /* Registration Form */

function showRegisterForm() {

  content.innerHTML = `

    <div class="register-form">

      <h2>Register Yourself</h2>

      <form id="registrationForm">

        <input type="text"
               id="name"
               placeholder="Full Name *"
               required>

        <input type="text"
               id="contact"
               placeholder="Contact Number (10 digits) *"
               maxlength="10"
               required>

        <input type="email"
               id="email"
               placeholder="Email ID (Optional)">

        <input type="text"
               id="flat"
               placeholder="Flat / Apartment No. *"
               required>

        <input type="text"
               id="street"
               placeholder="Street Address *"
               required>

        <input type="text"
               id="pin"
               placeholder="PIN Code  (6 digits) *"
               maxlength="6"
               required>
        <div style="
            color:red;
            font-size:13px;
            margin-bottom:15px;
        ">
        <button type="submit">
          Submit
        </button>

      </form>

      <div id="responseMsg"
           style="
             margin-top:15px;
             font-weight:bold;
             color:green;
           ">
      </div>

    </div>

  `;

  document.getElementById('registrationForm')
    .addEventListener('submit', submitRegistration);
}

/* Submit Registration */

async function submitRegistration(event) {

  event.preventDefault();

  const contact =
    document.getElementById('contact').value;

  const pin =
    document.getElementById('pin').value;

  /* Validation */

  if (!/^[0-9]{10}$/.test(contact)) {

    alert("Contact number must be 10 digits.");
    return;
  }

  if (!/^[0-9]{6}$/.test(pin)) {

    alert("PIN code must be 6 digits.");
    return;
  }

  let latitude = "";
  let longitude = "";

  /* Browser Location */

  if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(
      async function(position) {

        latitude = position.coords.latitude;
        longitude = position.coords.longitude;

        await sendData(latitude, longitude);
      },

      async function() {

        await sendData("", "");
      }
    );

  } else {

    await sendData("", "");
  }
}

/* Send Data to Flask */

async function sendData(latitude, longitude) {

  const payload = {

    name:
      document.getElementById('name').value,

    contact:
      document.getElementById('contact').value,

    email:
      document.getElementById('email').value,

    flat:
      document.getElementById('flat').value,

    street:
      document.getElementById('street').value,

    pin:
      document.getElementById('pin').value,

    latitude: latitude,
    longitude: longitude
  };

  const response = await fetch('/register', {

    method: 'POST',

    headers: {
      'Content-Type': 'application/json'
    },

    body: JSON.stringify(payload)
  });

  const result = await response.json();

  document.getElementById('responseMsg')
    .innerHTML =
      "Registration successful.<br>" +
      "Your IP Address: " + result.ip_address;
    }

    /* Filter Doctors */
